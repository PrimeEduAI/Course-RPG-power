<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 影片冒險者</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <header id="hud-top">
      <div id="level-card">
        <div id="level-title">Lv.1 新手冒險者</div>
        <div id="exp-bar"><div id="exp-fill"></div></div>
        <div id="exp-text">0 / 19</div>
      </div>
    </header>

    <!-- 左:裝備欄(知識點) -->
    <aside id="equip-panel" class="side-panel side-left">
      <div class="side-head">
        <span>🎒 裝備欄 · 知識點</span>
        <button class="collapse-btn" title="收合">▾</button>
      </div>
      <div id="bag-list" class="side-body"></div>
      <div class="side-foot">
        <button id="btn-reset">🔄 新的冒險（重置進度）</button>
      </div>
    </aside>

    <!-- 右:天賦欄(導演思維) -->
    <aside id="talent-panel" class="side-panel side-right">
      <div class="side-head">
        <span>✨ 天賦欄 · 導演思維</span>
        <button class="collapse-btn" title="收合">▾</button>
      </div>
      <div class="side-body">
        <div id="talent-tree"></div>
        <div id="talent-hint">點亮天賦，冒險者會獲得導演的思維光環！</div>
      </div>
    </aside>

    <div id="toast" class="hidden"></div>
    <div id="hint-bottom">左邊打勾穿裝備、右邊點亮天賦（拖曳畫面可以旋轉視角）</div>
    <a id="btn-edit" href="/edit.html" title="編輯知識點與天賦內容">✏️</a>
    <button id="btn-hero" title="切換少年/少女">👧</button>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
